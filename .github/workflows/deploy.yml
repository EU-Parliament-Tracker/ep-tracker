name: Deploy site

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clear Jekyll cache
        run: |
          rm -rf .jekyll-cache
          rm -rf .sass-cache
          rm -rf _site

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Check data and build
        run: |
          echo "First MEP in data:"
          ruby -e "require 'json'; d=JSON.parse(File.read('_data/meps.json')); puts d[0]['full_name']"
          bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production
          RUBYOPT: "-E utf-8"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
