name: Fetch EP data & deploy

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r fetch/requirements.txt

      - name: Fetch EP data
        run: python fetch/fetch_ep_data.py
        env:
          EP_DATA_DIR: ${{ github.workspace }}/_data

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/ _pages/meps/
          if git commit -m "data: daily EP update $(date -u +%Y-%m-%d)"; then
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit, skipping push"
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          RUBYOPT: "-E utf-8"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
