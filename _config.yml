# =============================================================================
# EP Tracker — Jekyll Configuration
# Theme: Minimal Mistakes (remote theme via GitHub Pages)
# =============================================================================
encoding: utf-8
liquid:
  error_mode: warn

title:          "EP Tracker"
subtitle:       "European Parliament activity at a glance"
title:          "EP Tracker"
subtitle:       "European Parliament activity at a glance"
name:           "EP Tracker"
description:    >
  Track MEP voting records, plenary sessions, legislative documents,
  and parliamentary questions from the European Parliament.
url:            "https://eu-parliament-tracker.github.io"
baseurl:        "/ep-tracker"
repository:     "EU-Parliament-Tracker/ep-tracker"

# Remote theme (no gem install needed on GitHub Pages)
remote_theme: mmistakes/minimal-mistakes@4.26.2

# Minimal Mistakes skin
# Options: default, air, aqua, contrast, dark, dirt, mint, neon, plum, sunrise
minimal_mistakes_skin: "default"

# =============================================================================
# Site settings
# =============================================================================

locale:         "en-EU"
timezone:       "Europe/Brussels"

# Show dates as "25 March 2025"
date_format:    "%d %B %Y"

# =============================================================================
# Author (used in sidebar / about)
# =============================================================================

author:
  name:    "EP Tracker"
  bio:     "Independent tracking of European Parliament activity."
  links:
    - label: "GitHub"
      icon:  "fab fa-fw fa-github"
      url:   "https://github.com/your-org/ep-tracker"

# =============================================================================
# Navigation
# =============================================================================

# _data/navigation.yml overrides this — defined there for clarity

# =============================================================================
# Collections
# =============================================================================

# No Jekyll collections needed — all data comes from _data/*.json
# Individual MEP pages are generated by a plugin (see _plugins/mep_pages.rb)

# =============================================================================
# Defaults
# =============================================================================

defaults:
  # Global
  - scope:
      path: ""
    values:
      layout:        single
      author_profile: false
      read_time:     false
      share:         false
      related:       false

  # MEP pages
  - scope:
      path:   "meps"
      type:   pages
    values:
      layout: mep

# =============================================================================
# Plugins (safe for GitHub Pages)
# =============================================================================

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-include-cache

# =============================================================================
# Build settings
# =============================================================================

markdown:  kramdown
highlighter: rouge

kramdown:
  input:        GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - fetch/
  - "*.py"
  - "requirements.txt"
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github/
  - vendor/
  - node_modules/

# Include hidden files needed by GitHub Pages
include:
  - _pages

# =============================================================================
# Search (Minimal Mistakes built-in — uses Lunr.js, fully client-side)
# =============================================================================

search:           true
search_full_content: true
search_provider: lunr
