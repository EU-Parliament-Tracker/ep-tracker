/* ── Hemicycle SVG ── */
function Hemicycle({ size = 520 }) {
  const cx = size / 2, cy = size * 0.535;
  const rMin = size * 0.155, rMax = size * 0.43, ROWS = 12;
  const A0 = Math.PI * 0.07, A1 = Math.PI * 0.93;
  const N = TOTAL_SEATS;

  const radii = Array.from({ length: ROWS }, (_, i) => rMin + (rMax - rMin) * i / (ROWS - 1));
  const totalR = radii.reduce((s, r) => s + r, 0);
  let rowSeats = radii.map(r => Math.round(N * r / totalR));
  const diff = rowSeats.reduce((s, x) => s + x, 0) - N;
  rowSeats[ROWS - 1] -= diff;

  const colors = [], abbrs = [];
  GROUPS.forEach(g => { for (let i = 0; i < g.seats; i++) { colors.push(g.color); abbrs.push(g.abbr); } });

  const seats = [];
  for (let row = 0; row < ROWS; row++) {
    const n = rowSeats[row], r = radii[row];
    for (let i = 0; i < n; i++) {
      const a = A0 + (A1 - A0) * i / Math.max(n - 1, 1);
      seats.push({ x: cx + r * Math.cos(a), y: cy - r * Math.sin(a), a });
    }
  }
  seats.sort((a, b) => b.a - a.a);
  const r = 3.2;

  return (
    <svg viewBox={`0 0 ${size} ${cy + r * 3}`} width="100%" style={{ display: 'block' }}>
      {seats.map((s, i) => (
        <circle key={i} cx={s.x.toFixed(1)} cy={s.y.toFixed(1)} r={r} fill={colors[i] || '#999'} opacity="0.92" />
      ))}
    </svg>
  );
}

/* ── Interactive hemicycle ── */
function InteractiveHemicycle({ onGroupClick }) {
  const [hovered, setHovered] = React.useState(null);
  const [tooltip, setTooltip] = React.useState({ x: 0, y: 0 });
  const svgRef = React.useRef(null);
  const size = 520;
  const cx = size / 2, cy = size * 0.535;
  const rMin = size * 0.155, rMax = size * 0.43, ROWS = 12;
  const A0 = Math.PI * 0.07, A1 = Math.PI * 0.93;
  const N = TOTAL_SEATS;
  const radii = Array.from({ length: ROWS }, (_, i) => rMin + (rMax - rMin) * i / (ROWS - 1));
  const totalR = radii.reduce((s, r) => s + r, 0);
  let rowSeats = radii.map(r => Math.round(N * r / totalR));
  rowSeats[ROWS - 1] -= rowSeats.reduce((s, x) => s + x, 0) - N;
  const colorArr = [], groupArr = [];
  GROUPS.forEach(g => { for (let i = 0; i < g.seats; i++) { colorArr.push(g.color); groupArr.push(g); } });
  const seats = [];
  for (let row = 0; row < ROWS; row++) {
    const n = rowSeats[row], r = radii[row];
    for (let i = 0; i < n; i++) {
      const a = A0 + (A1 - A0) * i / Math.max(n - 1, 1);
      seats.push({ x: cx + r * Math.cos(a), y: cy - r * Math.sin(a), a });
    }
  }
  seats.sort((a, b) => b.a - a.a);
  const dotR = 3.2;
  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} viewBox={`0 0 ${size} ${cy + dotR * 3}`} width="100%"
        style={{ display: 'block', cursor: hovered ? 'pointer' : 'default' }}
        onMouseLeave={() => setHovered(null)}
        onClick={() => hovered && onGroupClick(hovered)}>
        {seats.map((s, i) => {
          const g = groupArr[i], isHov = hovered && hovered.abbr === g.abbr, dimmed = hovered && !isHov;
          return <circle key={i} cx={s.x.toFixed(1)} cy={s.y.toFixed(1)} r={isHov ? dotR*1.35 : dotR}
            fill={colorArr[i]||'#999'} opacity={dimmed ? 0.12 : 0.92}
            style={{ transition: 'opacity 0.1s' }}
            onMouseEnter={e => { setHovered(g); const rect=svgRef.current.getBoundingClientRect(); setTooltip({x:e.clientX-rect.left,y:e.clientY-rect.top}); }}
            onMouseMove={e => { const rect=svgRef.current.getBoundingClientRect(); setTooltip({x:e.clientX-rect.left,y:e.clientY-rect.top}); }}/>;
        })}
      </svg>
      {hovered && (
        <div style={{ position: 'absolute', left: tooltip.x+12, top: tooltip.y-50, background: '#0d1a3a',
          color: '#fff', borderRadius: 8, padding: '0.6rem 0.9rem', pointerEvents: 'none',
          fontSize: '0.82rem', whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,0.25)', zIndex: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.2rem' }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:hovered.color, display:'inline-block' }}/>
            <strong>{hovered.abbr}</strong>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:'0.75rem', opacity:0.65 }}>{hovered.seats} seats</span>
          </div>
          <div style={{ fontSize:'0.72rem', opacity:0.55, marginBottom:'0.3rem' }}>{hovered.name}</div>
          <div style={{ fontSize:'0.7rem', color:'#FFCC00', fontFamily:"'DM Mono',monospace" }}>Click → browse {hovered.abbr} MEPs</div>
        </div>
      )}
    </div>
  );
}

══════════════════════════════════════════════════ */
function VariationA() {
  const saved = localStorage.getItem('ep_page_a');
  const [page, setPageRaw] = React.useState(saved || 'home');
  const [selectedMEP, setSelectedMEP] = React.useState(null);
  const [clickedGroup, setClickedGroup] = React.useState(null);

  function setPage(p) { setPageRaw(p); localStorage.setItem('ep_page_a', p); }

  function handleGroupClick(group) {
    setClickedGroup(group);
    setTimeout(() => { setClickedGroup(null); setPage('meps'); }, 700);
  }

  return (
    <HemicycleShell page={page} setPage={setPage}>
      {page === 'home'    && <HomePage setPage={setPage} handleGroupClick={handleGroupClick} clickedGroup={clickedGroup}/>}
      {page === 'votes'   && <VotesPage/>}
      {page === 'meps'    && <MEPsPage setPage={setPage} setSelectedMEP={setSelectedMEP}/>}
      {page === 'profile' && <MEPProfilePage mep={selectedMEP} setPage={setPage}/>}
    </HemicycleShell>
  );
}

/* ── App shell ── */
function App() {
  const saved = localStorage.getItem('ep_redesign_variation');
  const [variation, setVariation] = React.useState(saved || TWEAK_DEFAULTS.variation || 'A');
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem('ep_redesign_variation', variation);
  }, [variation]);

  // Tweaks integration
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const OPTIONS = [
    { key: 'A', label: 'A — Institutional Refined' },
    { key: 'B', label: 'B — Dark Authority' },
    { key: 'C', label: 'C — Morning Briefing' },
  ];

  return (
    <>
      {/* Switcher bar */}
      <div className="switcher">
        <span className="switcher__label">Variation</span>
        {OPTIONS.map((o, i) => (
          <React.Fragment key={o.key}>
            {i > 0 && <span className="switcher__sep">·</span>}
            <button className={`switcher__btn${variation === o.key ? ' active' : ''}`}
              onClick={() => setVariation(o.key)}>{o.label}</button>
          </React.Fragment>
        ))}
        <span style={{ marginLeft: 'auto', fontFamily: "'DM Mono', monospace", fontSize: '0.65rem',
          color: '#555', letterSpacing: '0.06em' }}>
          Audience: EU Policy Professionals · Airy density
        </span>
      </div>

      {/* Preview frame */}
      <div className="preview-frame">
        {variation === 'A' && <VariationA />}
        {variation === 'B' && <VariationB />}
        {variation === 'C' && <VariationC />}
      </div>

      {/* Tweaks panel */}
      <div className={`tweaks-panel${tweaksVisible ? ' visible' : ''}`}>
        <div className="tweaks-panel__title">Tweaks</div>
        {OPTIONS.map(o => (
          <div key={o.key} className={`tweaks-panel__opt${variation === o.key ? ' active' : ''}`}
            onClick={() => { setVariation(o.key); window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variation: o.key } }, '*'); }}>
            <div className="tweaks-panel__dot" />
            {o.label}
          </div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
